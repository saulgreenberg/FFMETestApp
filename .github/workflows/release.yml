name: Build and Release

# Runs when you push a tag like v1.0.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create a GitHub Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained, win-x64)
        run: dotnet publish FFMETestApp/FFMETestApp.csproj -c Release -r win-x64 --self-contained true -o ./publish

      - name: Copy Videos folder into publish output
        run: Copy-Item -Path Videos -Destination ./publish/Videos -Recurse

      - name: Zip publish output
        run: Compress-Archive -Path ./publish/* -DestinationPath FFMETestApp-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FFMETestApp-${{ github.ref_name }}.zip
